name: Deploy Zingwangwa LIMS to GitHub Pages

on:
  push:
    branches:
      - main   # Runs on every push to main
  workflow_dispatch: # Also allows manual trigger from GitHub UI

# Grant the workflow permission to push to the gh-pages branch
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # 1. Check out your code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Node.js 20
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Build the app
      #    Supabase credentials are injected via GitHub repository Secrets.
      #    Go to: Settings → Secrets and variables → Actions → New repository secret
      #    Add: VITE_SUPABASE_URL and VITE_SUPABASE_ANON_KEY
      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_AFRICASTALKING_USERNAME: ${{ secrets.VITE_AFRICASTALKING_USERNAME }}
          VITE_AFRICASTALKING_API_KEY: ${{ secrets.VITE_AFRICASTALKING_API_KEY }}

      # 5. Upload the dist/ folder as a GitHub Pages artifact
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      # 6. Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
